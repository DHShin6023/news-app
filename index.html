<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>주요 뉴스</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="주요뉴스" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #f4f5f7;
      color: #111;
      min-height: 100vh;
    }

    /* ── Header ── */
    .app-header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .app-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .last-updated {
      font-size: 11px;
      color: #888;
    }
    .refresh-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: #f0f0f0; }
    .refresh-btn svg { width: 20px; height: 20px; color: #444; }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main Content ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 12px 12px 32px;
    }

    /* ── Category Section ── */
    .category-section {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .category-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .category-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .category-badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 99px;
      letter-spacing: 0.2px;
    }

    /* Category color themes */
    .cat-us    { --accent: #0066CC; --bg: #EEF4FF; --badge-bg: #D6E8FF; --badge-color: #003E99; }
    .cat-kr    { --accent: #D0021B; --bg: #FFF0F1; --badge-bg: #FFD6DA; --badge-color: #8C0010; }
    .cat-coin  { --accent: #E07C00; --bg: #FFF7ED; --badge-bg: #FFE5B4; --badge-color: #8C4A00; }
    .cat-land  { --accent: #167A50; --bg: #EDFBF3; --badge-bg: #C3F0D5; --badge-color: #0B4D31; }
    .cat-etc   { --accent: #6B3ACC; --bg: #F3EEFF; --badge-bg: #E0D0FF; --badge-color: #3D1A8C; }

    .category-icon   { background: var(--bg); color: var(--accent); }
    .category-title  { color: var(--accent); }
    .category-badge  { background: var(--badge-bg); color: var(--badge-color); }

    /* ── News Items ── */
    .news-list { padding: 0 16px; }

    .news-item {
      padding: 12px 0;
      border-bottom: 1px solid #f5f5f5;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: background 0.1s;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item:hover .news-title { color: var(--accent); }

    .news-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.45;
      color: #111;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.15s;
    }
    .news-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }
    .news-source {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
    }
    .news-dot { font-size: 10px; color: #ccc; }
    .news-time { font-size: 11px; color: #999; }

    /* ── Skeleton ── */
    .skeleton-item {
      padding: 12px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .skeleton-item:last-child { border-bottom: none; }
    .skel {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    .skel-title-1 { height: 14px; width: 95%; margin-bottom: 6px; }
    .skel-title-2 { height: 14px; width: 70%; margin-bottom: 8px; }
    .skel-meta   { height: 11px; width: 120px; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Error State ── */
    .error-msg {
      padding: 16px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }
    .error-msg span { display: block; font-size: 22px; margin-bottom: 6px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: #bbb;
    }
  </style>
</head>
<body>

<header class="app-header">
  <h1>📰 주요 뉴스</h1>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">로딩 중...</span>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()" title="새로고침">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
    </button>
  </div>
</header>

<main>
  <!-- 1. 미국 주식 -->
  <section class="category-section cat-us">
    <div class="category-header">
      <div class="category-icon">🇺🇸</div>
      <span class="category-title">미국 주식</span>
      <span class="category-badge">US MARKET</span>
    </div>
    <div class="news-list" id="cat-us"></div>
  </section>

  <!-- 2. 한국 주식 -->
  <section class="category-section cat-kr">
    <div class="category-header">
      <div class="category-icon">🇰🇷</div>
      <span class="category-title">한국 주식</span>
      <span class="category-badge">KR MARKET</span>
    </div>
    <div class="news-list" id="cat-kr"></div>
  </section>

  <!-- 3. 코인 -->
  <section class="category-section cat-coin">
    <div class="category-header">
      <div class="category-icon">₿</div>
      <span class="category-title">코인</span>
      <span class="category-badge">CRYPTO</span>
    </div>
    <div class="news-list" id="cat-coin"></div>
  </section>

  <!-- 4. 부동산 -->
  <section class="category-section cat-land">
    <div class="category-header">
      <div class="category-icon">🏢</div>
      <span class="category-title">부동산</span>
      <span class="category-badge">REAL ESTATE</span>
    </div>
    <div class="news-list" id="cat-land"></div>
  </section>

  <!-- 5. 기타 중요한 뉴스 -->
  <section class="category-section cat-etc">
    <div class="category-header">
      <div class="category-icon">🌐</div>
      <span class="category-title">기타 중요한 뉴스</span>
      <span class="category-badge">GLOBAL</span>
    </div>
    <div class="news-list" id="cat-etc"></div>
  </section>
</main>

<footer>뉴스는 10분마다 자동 갱신됩니다 · Google 뉴스</footer>

<script>
const TRANS_CACHE_KEY = 'news_trans_v1';
const DATA_URL = 'news_data.json';

const CAT_IDS = ['cat-us', 'cat-kr', 'cat-coin', 'cat-land', 'cat-etc'];

/* ── 번역 (한국어 아닌 제목 안전망) ── */
function isKorean(text) {
  const ko = (text.match(/[가-힣]/g) || []).length;
  return ko / text.length > 0.25;
}
function loadCache() {
  try { return JSON.parse(localStorage.getItem(TRANS_CACHE_KEY) || '{}'); } catch { return {}; }
}
function saveCache(cache) {
  const keys = Object.keys(cache);
  if (keys.length > 300) { const t = {}; keys.slice(-200).forEach(k => t[k] = cache[k]); cache = t; }
  try { localStorage.setItem(TRANS_CACHE_KEY, JSON.stringify(cache)); } catch {}
}
async function translateToKo(text) {
  if (!text || isKorean(text)) return text;
  const cache = loadCache();
  if (cache[text]) return cache[text];
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ko&dt=t&q=${encodeURIComponent(text)}`;
    const d = await (await fetch(url)).json();
    const result = (d[0] || []).map(x => x[0]).join('') || text;
    cache[text] = result; saveCache(cache);
    return result;
  } catch { return text; }
}

/* ── Helpers ── */
function timeAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
  if (isNaN(diff) || diff < 0) return '';
  if (diff < 60)    return '방금 전';
  if (diff < 3600)  return `${Math.floor(diff / 60)}분 전`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
  return `${Math.floor(diff / 86400)}일 전`;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Render ── */
function renderSkeleton() {
  return Array(3).fill('').map(() => `
    <div class="skeleton-item">
      <div class="skel skel-title-1"></div>
      <div class="skel skel-title-2"></div>
      <div class="skel skel-meta"></div>
    </div>`).join('');
}

function renderItems(items) {
  return items.map(item => {
    const title = item.titleKo || item.title || '제목 없음';
    const time  = timeAgo(item.pubDate);
    const src   = item.source || '';
    return `
      <a class="news-item" href="${item.link}" target="_blank" rel="noopener">
        <div class="news-title">${escHtml(title)}</div>
        <div class="news-meta">
          ${src  ? `<span class="news-source">${escHtml(src)}</span>` : ''}
          ${src && time ? '<span class="news-dot">·</span>' : ''}
          ${time ? `<span class="news-time">${time}</span>` : ''}
        </div>
      </a>`;
  }).join('');
}

/* ── 데이터 로드 & 렌더 ── */
CAT_IDS.forEach(id => {
  document.getElementById(id).innerHTML = renderSkeleton();
});

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('lastUpdated').textContent = '업데이트 중...';

  try {
    const res = await fetch(`${DATA_URL}?t=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();

    await Promise.all(CAT_IDS.map(async id => {
      const el = document.getElementById(id);
      const raw = data[id] || [];
      if (raw.length === 0) {
        el.innerHTML = `<div class="error-msg"><span>📭</span>뉴스를 불러올 수 없습니다</div>`;
        return;
      }
      const items = await Promise.all(raw.map(async item => ({
        ...item, titleKo: await translateToKo(item.title)
      })));
      el.innerHTML = renderItems(items);
    }));

    const updated = data.updated ? new Date(data.updated) : new Date();
    const h = String(updated.getHours()).padStart(2,'0');
    const m = String(updated.getMinutes()).padStart(2,'0');
    document.getElementById('lastUpdated').textContent = `${h}:${m} 업데이트`;

  } catch (_) {
    document.getElementById('lastUpdated').textContent = '로드 실패';
  }

  btn.classList.remove('spinning');
}

refreshAll();
setInterval(refreshAll, 10 * 60 * 1000);
</script>
</body>
</html>
